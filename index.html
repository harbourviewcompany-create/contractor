<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Northcrest Roofing Co. | Free Roof Estimates</title><meta name="description" content="Professional roofing, clean workmanship and clear estimates for local homeowners."><style>:root{--c:#151a1f;--s:#1f2a36;--o:#f7f4ef;--w:#fff;--a:#b56b36;--b:#934f25;--m:#6b7280;--r:#e5e1da}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--o);color:var(--c);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}h1,h2,h3{font-family:Georgia,serif;line-height:1.08;margin:0 0 18px}h1{font-size:clamp(2.4rem,7vw,4.5rem)}h2{font-size:clamp(1.9rem,4vw,3rem)}p{line-height:1.6;color:#35404a}.wrap,section,footer{max-width:1180px;margin:auto}section,footer{padding:78px 24px}.eyebrow{color:var(--a);font-weight:800;text-transform:uppercase;letter-spacing:.12em;font-size:.78rem}.lead{font-size:1.2rem}.micro{font-size:.92rem;color:var(--m)}header{position:sticky;top:0;z-index:10;background:rgba(247,244,239,.95);border-bottom:1px solid var(--r);display:flex;align-items:center;gap:24px;justify-content:space-between;padding:16px 24px}.brand{font-family:Georgia,serif;font-size:1.25rem;font-weight:800;color:var(--c);text-decoration:none}nav{display:flex;gap:18px}nav a,.call{color:var(--c);text-decoration:none;font-size:.95rem}.btn,.small{border:0;border-radius:999px;background:var(--a);color:white;font-weight:800;padding:15px 24px;cursor:pointer}.btn:hover,.small:hover{background:var(--b)}.secondary{background:transparent;color:var(--c);border:1px solid rgba(21,26,31,.35)}.hero{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;min-height:720px}.actions{display:flex;gap:14px;flex-wrap:wrap}.image{border-radius:32px;background:linear-gradient(135deg,#2a3642,#151a1f 45%,#b56b36);min-height:340px;display:flex;align-items:end;padding:28px;color:#fff;box-shadow:0 20px 60px rgba(21,26,31,.18);font-weight:800}.trust{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding-top:20px}.trust span,.chip{background:white;border:1px solid var(--r);border-radius:999px;padding:14px 18px;font-weight:800;text-align:center}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}.card,.step,blockquote,.panel{background:white;border:1px solid var(--r);border-radius:28px;padding:24px;box-shadow:0 18px 50px rgba(21,26,31,.07)}.card .image{min-height:220px;border-radius:20px;margin-bottom:20px}.link{background:none;border:0;color:var(--a);font-weight:800;padding:0;cursor:pointer}.dark{max-width:none;background:var(--s);color:#fff}.dark>div{max-width:1180px;margin:auto}.dark p,.dark h2{color:#fff}.split{display:grid;grid-template-columns:1fr 1fr;gap:42px;align-items:center}.steps b{color:var(--a)}.reviews{max-width:none;background:linear-gradient(rgba(21,26,31,.82),rgba(21,26,31,.82)),linear-gradient(135deg,#314252,#111);color:white}.reviews>*{max-width:1180px;margin-left:auto;margin-right:auto}.reviews p,.reviews h2{color:white}cite{display:block;margin-top:15px;color:#f4d6be;font-style:normal;font-weight:800}.final{background:linear-gradient(135deg,var(--c),var(--s));border-radius:34px;color:white;margin:70px auto;padding:70px 36px;text-align:center}.final p,.final h2{color:white}.formsec{display:grid;grid-template-columns:.8fr 1.2fr;gap:34px}.form{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form label{display:grid;gap:6px;font-weight:800;color:#26313a}.form input,.form select,.form textarea{width:100%;border:1px solid var(--r);border-radius:14px;padding:14px;font:inherit}.full{grid-column:1/-1}.hide{display:none}.submit{font-size:1rem}.thank{min-height:75vh;display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center}footer{display:grid;grid-template-columns:2fr 1fr 1fr;gap:24px;border-top:1px solid var(--r)}.demo{grid-column:1/-1;font-size:.85rem;color:var(--m)}@media(max-width:820px){nav,.call{display:none}header{gap:12px}.small{padding:12px 16px}.hero,.split,.formsec,.thank{grid-template-columns:1fr;min-height:auto}.trust,.grid,.form,footer{grid-template-columns:1fr}.hero{padding-top:46px}.secondary{color:var(--c)}section,footer{padding:54px 20px}}</style></head><body><form name="estimate-request" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden><input type="hidden" name="form-name" value="estimate-request"><input name="bot-field"><input name="fullName"><input name="email"><input name="phone"><input name="propertyAddress"><input name="serviceType"><input name="timing"><input name="preferredContact"><input name="roofAge"><input name="activeLeak"><textarea name="projectDetails"></textarea><input name="consent"></form><div id="app"></div><script>const f=()=>document.getElementById('estimate-form')?.scrollIntoView({behavior:'smooth'});const img=t=>`<div class="image" role="img" aria-label="${t}">${t}</div>`;const header=`<header><a class="brand" href="/">Northcrest Roofing Co.</a><nav><a href="#services">Services</a><a href="#process">Process</a><a href="#reviews">Reviews</a><a href="#service-area">Service Area</a></nav><a class="call" href="tel:+10000000000">Call Now</a><button class="small" onclick="document.getElementById('estimate-form').scrollIntoView({behavior:'smooth'})">Get Estimate</button></header>`;const foot=`<footer><div><h3>Northcrest Roofing Co.</h3><p>Professional roofing, clean workmanship and clear estimates for local homeowners.</p></div><div><h4>Services</h4><p>Roof Replacement<br>Roof Repair<br>Roof Inspection<br>Storm Damage<br>Gutters & Flashing</p></div><div><h4>Contact</h4><p>Phone: Add company phone<br>Email: Add company email<br>Service Area: Add local service region</p></div><p class="demo">This demo layout should be updated with verified company contact details, license information and actual service-area claims before public use.</p></footer>`;function home(){return header+`<main><section class="hero"><div><p class="eyebrow">Residential Roofing Specialists</p><h1>A stronger roof starts with a clearer estimate.</h1><p class="lead">Northcrest Roofing Co. helps homeowners handle roof replacements, repairs, inspections and storm damage with clean workmanship, organized crews and straightforward recommendations.</p><div class="actions"><button class="btn" onclick="f()">Get a Free Roof Estimate</button><button class="btn secondary" onclick="f()">Book a Roof Inspection</button></div><p class="micro">Tell us what is happening with your roof. We will review the details and recommend the next step.</p></div>${img('Clean suburban home with a new dark roof and professional roofing crew')}</section><section class="trust"><span>Clear Written Estimates</span><span>Roof Repairs & Replacements</span><span>Clean Workmanship Standards</span><span>Local Residential Service</span></section><section id="services"><p class="eyebrow">Roofing Services</p><h2>The right roofing help for the problem in front of you.</h2><p>Whether your roof needs a full replacement, a focused repair or a professional inspection, Northcrest gives you a clear recommendation before work begins.</p><div class="grid"><article class="card">${img('Roof Replacement')}<h3>Roof Replacement</h3><p>Complete roof replacement for aging, damaged or failing roofing systems with clean installation standards and clear project communication.</p><button class="link" onclick="f()">Request Replacement Estimate</button></article><article class="card">${img('Roof Repair')}<h3>Roof Repair</h3><p>Focused repairs for leaks, missing shingles, flashing issues and roof sections that need attention before the problem spreads.</p><button class="link" onclick="f()">Request Repair Help</button></article><article class="card">${img('Roof Inspection')}<h3>Roof Inspection</h3><p>Professional roof inspections for homeowners who want a clear view of condition, urgency and next steps.</p><button class="link" onclick="f()">Book Inspection</button></article><article class="card">${img('Storm Damage')}<h3>Storm Damage</h3><p>Calm, organized support after wind, rain or hail damage so you can understand the issue and decide what to do next.</p><button class="link" onclick="f()">Get Storm Damage Review</button></article></div></section><section class="dark"><div><h2>Not sure whether your roof needs repair or replacement?</h2><p>Start with an inspection. We will review the visible condition, discuss the issue and explain whether repair, replacement or monitoring makes the most sense.</p><button class="btn" onclick="f()">Book a Roof Inspection</button><p class="micro">No pressure. Clear next steps first.</p></div></section><section class="split"><div>${img('Professional roofing team in front of a residential home')}</div><div><p class="eyebrow">Why Northcrest</p><h2>A cleaner roofing process from first estimate to final walkthrough.</h2><p>Roofing work should not feel chaotic. Northcrest is built around clear communication, organized crews and job sites that are treated with care.</p><ul><li>Clear written recommendations before work begins</li><li>Organized crews and clean project flow</li><li>Repair and replacement options explained plainly</li><li>Residential roofing focus</li><li>Respect for your home, property and schedule</li></ul><button class="btn" onclick="f()">Request Your Estimate</button></div></section><section id="process"><p class="eyebrow">How It Works</p><h2>A simple process for getting the roof handled properly.</h2><div class="grid steps"><article class="step"><b>1</b><h3>Tell us what is happening</h3><p>Submit the estimate form with the issue, timeline and property details.</p></article><article class="step"><b>2</b><h3>Schedule a review</h3><p>We arrange an inspection or project conversation based on the urgency.</p></article><article class="step"><b>3</b><h3>Get a clear recommendation</h3><p>You receive practical guidance on repair, replacement or next steps.</p></article><article class="step"><b>4</b><h3>Final walkthrough</h3><p>The work is reviewed, cleaned up and completed with clear handoff.</p></article></div></section><section class="split"><div><p class="eyebrow">Storm Damage Support</p><h2>After heavy wind or rain, get the roof checked before small damage becomes expensive.</h2><p>Missing shingles, lifted flashing and roof leaks are easier to handle when they are reviewed early. Northcrest provides a calm inspection process and clear next-step guidance.</p><ul><li>Wind and rain damage checks</li><li>Leak source review</li><li>Temporary protection recommendations</li><li>Repair or replacement guidance</li></ul><button class="btn" onclick="f()">Request Storm Damage Review</button><p class="micro">For active leaks or urgent damage, call directly where available.</p></div>${img('Roofer inspecting minor storm damage')}</section><section id="reviews" class="reviews"><p class="eyebrow">Homeowner Confidence</p><h2>Built to feel clear, professional and easy to work with.</h2><p>Use this section for real homeowner reviews once the site is adapted for an actual roofing company.</p><div class="grid"><blockquote>“Clear estimate, clean work area and no confusion about what was happening next.”<cite>Example homeowner review</cite></blockquote><blockquote>“The inspection made it easy to understand whether repair or replacement made sense.”<cite>Example homeowner review</cite></blockquote></div></section><section id="service-area" class="split">${img('Residential neighborhood with well-maintained homes')}<div><p class="eyebrow">Service Area</p><h2>Residential roofing service for local homeowners.</h2><p>Northcrest Roofing Co. is built for homeowners who want a clear estimate, a professional crew and a clean roofing process from start to finish.</p><p class="micro">Use this section to list the actual cities, towns and neighborhoods served once the website is branded for a real roofing company.</p><div class="actions"><span class="chip">Local Neighborhoods</span><span class="chip">Nearby Suburbs</span><span class="chip">Residential Communities</span></div><p><button class="btn" onclick="f()">Check Availability</button></p></div></section><section class="final"><h2>Ready to understand what your roof actually needs?</h2><p>Send a few details about your roof and Northcrest will help you identify the right next step.</p><button class="btn" onclick="f()">Get a Free Roof Estimate</button></section><section id="estimate-form" class="formsec"><div><p class="eyebrow">Request an Estimate</p><h2>Tell us what is happening with your roof.</h2><p>Share the basics below. We will review your request and follow up with the next step.</p>${img('Roofing estimator reviewing project notes outside a residential home')}</div><form class="form" name="estimate-request" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you"><input type="hidden" name="form-name" value="estimate-request"><p class="hide"><label>Do not fill this out<input name="bot-field"></label></p><label>Full name<input required name="fullName" autocomplete="name"></label><label>Email address<input required type="email" name="email" autocomplete="email"></label><label>Phone number<input required name="phone" autocomplete="tel"></label><label>Property address or service area<input required name="propertyAddress"></label><label>What do you need help with?<select required name="serviceType"><option value="">Select one</option><option>Roof replacement</option><option>Roof repair</option><option>Roof inspection</option><option>Storm damage</option><option>Leak or water issue</option><option>Gutters or flashing</option><option>Not sure yet</option></select></label><label>When would you like the work reviewed?<select required name="timing"><option value="">Select timing</option><option>As soon as possible</option><option>This week</option><option>This month</option><option>Planning ahead</option><option>Not sure yet</option></select></label><label>Preferred contact method<select name="preferredContact"><option>No preference</option><option>Phone</option><option>Email</option><option>Text</option></select></label><label>Are there active leaks?<select name="activeLeak"><option>Not sure</option><option>Yes</option><option>No</option></select></label><label class="full">Approximate roof age<input name="roofAge"></label><label class="full">Project details<textarea required name="projectDetails" rows="5"></textarea></label><label class="full"><input required type="checkbox" name="consent" value="yes"> I understand this form is for estimate requests and that Northcrest Roofing Co. will contact me about my roofing inquiry.</label><button class="btn submit full" type="submit">Submit Estimate Request</button></form></section></main>`+foot}function thanks(){return header+`<main class="thank">${img('Roofing professional standing beside a service truck in front of a home')}<section><p class="eyebrow">Request Received</p><h1>Your estimate request has been received.</h1><p>Thank you for contacting Northcrest Roofing Co. Your request has been submitted and the details will be reviewed before the next step is recommended.</p><h2>What happens next</h2><ol><li>Your request details are reviewed.</li><li>A roofing specialist follows up using your preferred contact method.</li><li>If needed, an inspection or estimate conversation is scheduled.</li></ol><div class="actions"><a class="btn" href="/">Return to Homepage</a><a class="btn secondary" href="tel:+10000000000">Call Northcrest Roofing Co.</a></div><p class="micro">For urgent active leaks or storm damage, call directly where available.</p></section></main>`+foot}document.getElementById('app').innerHTML=location.pathname.startsWith('/thank-you')?thanks():home();</script></body></html>
