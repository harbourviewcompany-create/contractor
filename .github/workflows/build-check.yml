name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Verify output
        run: |
          test -f dist/index.html
          grep -q "Northcrest Roofing Co." dist/index.html
          grep -q "estimate-request" dist/index.html
          grep -q "Your estimate request has been received" dist/index.html
