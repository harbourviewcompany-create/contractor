name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Verify output
        run: |
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/app.js
          grep -q "Northcrest Roofing Co." dist/index.html
          grep -q "estimate-request" dist/index.html
          grep -q "sticky-mobile" dist/styles.css
          grep -q "A roofing website built to turn local roof problems into calls and estimates" dist/app.js
          grep -q "Project priority" dist/app.js
          grep -q "Are you the property owner" dist/app.js
          grep -q "Lead Delivery" dist/app.js
          grep -q "Why a Roofing Owner Would Care" dist/app.js
          grep -q "Your estimate request has been received" dist/app.js
          ! grep -qi "Licensed & Insured" dist/app.js
          ! grep -qi "25 years" dist/app.js
