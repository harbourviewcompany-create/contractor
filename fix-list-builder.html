<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fix List Builder | Vail Renovations</title><link rel="stylesheet" href="/assets/styles.css"></head><body><main class="section"><div class="container"><h1>Fix List Builder</h1><p>Group multiple small repairs into one organized service request.</p><form name="vail-fix-list" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" action="/thank-you" class="card"><input type="hidden" name="form-name" value="vail-fix-list"><p style="display:none"><label>Do not fill this out <input name="bot-field"></label></p><p><label>Name<br><input required name="name"></label></p><p><label>Email<br><input required type="email" name="email"></label></p><p><label>Fix list<br><textarea required name="tasks"></textarea></label></p><p><label>Photos<br><input required type="file" name="files" multiple></label></p><button class="btn btn-primary" type="submit">Submit Fix List</button></form></div></main></body></html>
