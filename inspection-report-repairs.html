<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inspection Report Repairs | Vail Renovations</title>
  <meta name="description" content="Upload an inspection report and supporting photos for Vail Renovations review.">
  <meta property="og:title" content="Inspection Report Repairs | Vail Renovations">
  <meta property="og:description" content="Upload an inspection report and supporting photos for Vail Renovations review.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vail-renovations.netlify.app/inspection-report-repairs">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Inspection Report Repairs | Vail Renovations">
  <meta name="twitter:description" content="Upload an inspection report and supporting photos for Vail Renovations review.">
  <link rel="canonical" href="https://vail-renovations.netlify.app/inspection-report-repairs">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="/">Vail Renovations <span>Vail Home Command</span></a>
      <a class="btn btn-secondary" href="/">Home</a>
    </nav>
  </header>
  <main>
    <section class="hero compact-hero">
      <div class="container">
        <p class="eyebrow">Inspection report repairs</p>
        <h1>Sort inspection items into a practical repair path.</h1>
        <p>Upload the report and supporting photos so repairable items, timing and specialist needs can be reviewed clearly.</p>
      </div>
    </section>
    <section class="section">
      <div class="container narrow">
        <form name="vail-inspection-report" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" action="/thank-you" class="card form-card">
          <input type="hidden" name="form-name" value="vail-inspection-report">
          <p class="hidden-field"><label>Do not fill this out <input name="bot-field"></label></p>
          <label>Name<input required name="name" autocomplete="name"></label>
          <label>Email<input required type="email" name="email" autocomplete="email"></label>
          <label>Phone<input name="phone" autocomplete="tel"></label>
          <label>Property address or service area<input required name="service-area"></label>
          <label>Closing or repair timeline<input name="timeline"></label>
          <label>Inspection report and photos<input required type="file" name="files" multiple></label>
          <label>Priority notes<textarea name="notes" rows="5"></textarea></label>
          <label class="check-row"><input required type="checkbox" name="consent" value="yes"> I agree Vail Renovations may review this request and contact me.</label>
          <button class="btn btn-primary" type="submit">Upload Report</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
